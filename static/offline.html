<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline</title>
		<style>
			:root {
				color-scheme: light;
			}
			body {
				margin: 0;
				min-height: 100svh;
				display: grid;
				place-items: center;
				background: #0f172a;
				color: #f8fafc;
				font-family: system-ui, -apple-system, sans-serif;
			}
			main {
				text-align: center;
				max-width: 32rem;
				padding: 2rem;
			}
			h1 {
				margin: 0 0 0.75rem;
				font-size: 1.5rem;
				letter-spacing: 0.02em;
			}
			p {
				margin: 0;
				line-height: 1.6;
				color: #cbd5f5;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>You are offline</h1>
			<p>
				The app is still available, but new lessons or audio may need a connection. Try again
				when you are back online.
			</p>
		</main>
	</body>
</html>
